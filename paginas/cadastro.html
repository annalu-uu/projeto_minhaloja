<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Loja Virtual</title>

    <link rel="stylesheet" href="../css/style_cadastro.css">

</head>
<body>

    <main id="geral">
        <header id="cabecalho">
        <div id="logo">
            GamesCat
        </div>

        <nav id="menu">
            <ul>
                <li><a href="../index.html"> Home </a></li>
                <li><a href="/paginas/cadastro.html"> Cadastro </a></li>
                <li><a href="/paginas/sobre.html"> Sobre </a></li>
                <li><a href="/paginas/login.html"> Login </a></li>
                <li><a href="/paginas/carrinho.html">Carrinho</a></li>
            </ul>
        </nav>
    </header>

    <section id="form">
        <h3>Cadastro Pessoa</h3>

        <form id="form">
            <label for="nome">Nome</label>
            <input type="text" name="nome" id="nome"
            class="input001" required maxlength="60"
            placeholder="Digite seu nome">
            <label for="sobrenome">Sobrenome</label>
            <input type="text" name="sobrenome" id="sobrenome"
            class="input001" required maxlength="60"
            placeholder="Digite seu sobrenome">
            <label for="cpf">CPF</label>
            <input type="text" name="cpf" id="cpf"
            class="input001" required maxlength="60"
            placeholder="Digite o seu CPF">
            <label for="telefone">Telefone</label>
            <input type="text" name="telefone" id="telefone"
            class="input001" required maxlength="60"
            placeholder="Digite o seu telefone">
            <label for="email">Email</label>
            <input type="text" name="email" id="email"
            class="input001" required maxlength="60"
            placeholder="Digite o seu email">
            <label for="datadenascimento">Data de Nascimento</label>
            <input type="date" name="datadenascimento" id="datadenascimento"
            class="input002" required maxlength="60"
            placeholder="Digite sua Data de Nascimento">
            <label for="cep">CEP</label>
            <input type="text" name="cep" id="cep"
            class="input001" required maxlength="60"
            placeholder="Digite o seu CEP">
            <label for="logradouro">Logradouro</label>
            <input type="text" name="logradouro" id="logradouro"
            class="input001" required maxlength="60"
            placeholder="Digite o logradouro">
            <label for="numero">Número</label>
            <input type="text" name="numero" id="numero"
            class="input001" required maxlength="60"
            placeholder="Digite o número">
            <label for="complemento">Complemento</label>
            <input type="text" name="complemento" id="complemento"
            class="input001" required maxlength="60"
            placeholder="Digite o seu Complemento">
            <label for="bairro">Bairro</label>
            <input type="text" name="bairro" id="bairro"
            class="input001" required maxlength="60"
            placeholder="Digite o Bairro">
            <label for="cidade">Cidade</label>
            <input type="text" name="cidade" id="cidade"
            class="input001" required maxlength="60"
            placeholder="Digite a Cidade">
            <label for="estado">Estado</label>
            <input type="text" name="estado" id="estado"
            class="input001" required maxlength="60"
            placeholder="Digite o UF">
            <label for="senha">Senha</label>
            <input type="text" name="senha" id="senha"
            class="input001" required maxlength="60"
            placeholder="Digite sua senha">

            <button>Cadastrar</button>
            <button>Limpar</button>
            
    
        </form>
    </section>

</main>
   
    
    <footer id="rodape">
        <h3>&copy 2026 SuaLoja S.A. Todos os Diretos Reservados</h3>
        <p>Formas de pagamento: Pix, Cartões de Débito e Crédito</p>
    </footer>



</body>
</html>
